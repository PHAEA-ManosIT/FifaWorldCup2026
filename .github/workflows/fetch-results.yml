name: Fetch World Cup results

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC); GitHub may delay a few min
  workflow_dispatch: {}       # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: fetch-results
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch results
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
        run: node scripts/fetch-results.mjs
      - name: Commit if changed
        run: |
          git config user.name "wc-results-bot"
          git config user.email "wc-results-bot@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "update results $(date -u +%FT%TZ)"
            git push
          fi
